# .github/workflows/dbt_ci.yml
name: DBT CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  dbt-ci:
    runs-on: ubuntu-latest
    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/profiles
      DBT_TARGET: dev 

    steps:
      # 1. Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. Install DBT and dependencies
      - name: Install DBT
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core dbt-snowflake pandas

      # 4. Set up DBT profiles
      - name: Setup DBT profiles
        run: |
          mkdir -p $DBT_PROFILES_DIR
          echo "${{ secrets.DBT_PROFILES_YML }}" > $DBT_PROFILES_DIR/profiles.yml

      # 5. Run dbt seed
      - name: DBT Seed
        run: dbt seed --target $DBT_TARGET --full-refresh

      # 6. Run dbt models
      - name: DBT Run
        run: dbt run --target $DBT_TARGET

      # 7. Run dbt tests
      - name: DBT Test
        run: dbt test --target $DBT_TARGET