version: 2

sources:
  - name: silver
    database: AMAZON_DB
    schema: silver
    tables:
      - name: cleaned_orders
        columns:
          - name: event_id
            tests:
              - not_null

models:
  - name: dim_customers
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

      - name: customer_segment
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['REGULAR', 'PRIME', 'VIP']

  - name: dim_products
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

      - name: category
        tests:
          - not_null

  - name: fact_orders
    columns:
      - name: order_id
        tests:
          - not_null

      - name: customer_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id

      - name: product_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_id

      - name: event_type
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['ORDER_CREATED']

      - name: revenue
        tests:
          - not_null