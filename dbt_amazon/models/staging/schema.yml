
version: 2

sources:
  - name: silver
    database: AMAZON_DB
    schema: silver
    tables:
      - name: cleaned_orders

models:
  - name: dim_customers
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

  - name: dim_products
    columns:
      - name: product_id
        tests:
          - not_null

  - name: fact_orders
    columns:
      - name: order_id
        tests:
          - not_null
  
      - name: customer_id
        tests:
          - relationships:
              to: ref('dim_customers')
              field: customer_id

      - name: product_id
        tests:
          - relationships:
              to: ref('dim_products')
              field: product_id